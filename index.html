<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title> Tic Tac Toe </title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-default">
    <audio id="bg-music" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <audio id="click-sfx" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="win-sfx" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <div id="game-container">
        <div id="menu-screen" class="screen">
            <h1 class="game-title">TIC TAC TOE</h1>
            <button class="btn" onclick="showGridSelect('ai')">PLAY WITH AI BRO</button>
            <button class="btn" onclick="showGridSelect('friend')">PLAY WITH FRIEND</button>
            <button class="btn secondary" onclick="toggleThemeMenu()">CHANGE THEME</button>
            <button class="btn score-btn" onclick="showLeaderboard()">📊 VIEW SCORES</button>
            
            <div id="theme-options" class="hidden-panel">
                <div class="theme-dot default" onclick="setTheme('default')"></div>
                <div class="theme-dot neon" onclick="setTheme('neon')"></div>
                <div class="theme-dot gold" onclick="setTheme('gold')"></div>
                <div class="theme-dot emerald" onclick="setTheme('emerald')"></div>
                <div class="theme-dot royal" onclick="setTheme('royal')"></div>
                <div class="theme-dot dracula" onclick="setTheme('dracula')"></div>
                <div class="theme-dot sunset" onclick="setTheme('sunset')"></div>
            </div>
        </div>

        <div id="score-screen" class="screen" style="display: none;">
            <h2 class="sub-title">ALL TIME WINS</h2>
            <div class="score-box">
                <p>YOU: <span id="saved-user-wins">0</span></p>
                <p>AI: <span id="saved-ai-wins">0</span></p>
            </div>
            <button class="btn" onclick="goToMenu()">BACK</button>
        </div>

        <div id="grid-screen" class="screen" style="display: none;">
            <h2 class="sub-title">CHOOSE GRID</h2>
            <div class="grid-btns">
                <button class="grid-btn" onclick="startGame(2)">2x2</button>
                <button class="grid-btn" onclick="startGame(3)">3x3</button>
                <button class="grid-btn" onclick="startGame(4)">4x4</button>
                <button class="grid-btn" onclick="startGame(5)">5x5</button>
                <button class="grid-btn" onclick="startGame(6)">6x6</button>
            </div>
            <button class="btn" onclick="goToMenu()">BACK</button>
        </div>

        <div id="game-screen" class="screen" style="display: none;">
            <div id="goal-popup" class="popup-text">GET 3 IN A ROW</div>
            <div id="status">Player X's Turn</div>
            <div class="board" id="board"></div>
            <div class="game-controls">
                <button class="btn control" onclick="resetGame()">RESTART</button>
                <button class="btn control secondary" onclick="goToMenu()">MENU</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
