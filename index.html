<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAME SCROLL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="rotate-device">
        <div class="rotate-content">
            <p>Please rotate your device to <b>Portrait mode</b> for the best experience!</p>
        </div>
    </div>

    <div id="menu-screen">
        <img src="BG-SWIPE.png" id="menu-bg" alt="Background">
        
        <div class="menu-content">
            <div class="menu-header">
                </div>
            
            <div class="menu-actions">
                <button class="play-btn" onclick="startScrolling()">PLAY NOW</button>
                <button class="add-btn" onclick="window.location.href='mailto:your-email@example.com'">Add Your Game</button>
            </div>
        </div>

        <button class="about-btn" onclick="showAbout()">About Game</button>
    </div>

    <div id="game-screen" style="display: none;">
        <div class="top-nav">
            <div id="search-container">
                <div class="search-box-wrapper">
                    <input type="text" id="gameSearch" placeholder="Search for a game..." onkeyup="if(event.key==='Enter') searchGames()">
                    <button id="search-btn" onclick="searchGames()">SEARCH</button>
                </div>
            </div>
            <button onclick="backToMenu()" id="back-btn">✕</button>
        </div>
        
        <div id="scroll-container">
            </div>
    </div>

    <div id="aboutModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeAbout()">&times;</span>
            <h2>ABOUT GAME SWIPE</h2>
            <p>Welcome to the ultimate hub for instant gaming. Swipe through a curated collection of the best web games, handpicked for speed and fun.</p>
            <p><b>Created by:</b> Arsal</p>
            <p><b>Version:</b> 1.0.4</p>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
        function showAbout() {
            document.getElementById("aboutModal").style.display = "flex";
        }
        function closeAbout() {
            document.getElementById("aboutModal").style.display = "none";
        }
        // Close if user clicks outside the box
        window.onclick = function(event) {
            let modal = document.getElementById("aboutModal");
            if (event.target == modal) {
                closeAbout();
            }
        }
    </script>

</body>
</html>
