<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAME SCROLL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="rotate-device">
        <p>Please rotate your device to Landscape mode for the best experience!</p>
    </div>

    <div id="menu-screen">
        <img src="YOUR_IMAGE_URL_HERE" id="menu-bg" alt="Background">
        <div class="menu-content">
            <h1>GAME SCROLL</h1>
            <button onclick="startScrolling()">Start Scrolling</button>
            <button onclick="window.location.href='mailto:your-email@example.com'">Add Your Game</button>
        </div>
    </div>

    <div id="game-screen" style="display: none;">
        <button onclick="backToMenu()" id="back-btn">X</button>
        
        <div id="search-container">
            <div class="search-box-wrapper">
                <input type="text" id="gameSearch" placeholder="Find your next game...">
                <button id="search-btn" onclick="searchGames()">SEARCH</button>
            </div>
        </div>
        
        <div id="scroll-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
